<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Resource Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Hospital Resource Management Dashboard</h1>
        
        <div class="dashboard">
            <div class="card card-beds">
                <h3>🛏️ Beds Status</h3>
                <p>Available: <span id="available-beds">Loading...</span> / <span id="total-beds">0</span></p>
            </div>
            <div class="card card-doctors">
                <h3>🩺 Doctors Status</h3>
                <p>On Duty: <span id="onduty-doctors">Loading...</span> / <span id="total-doctors">0</span></p>
            </div>
            <div class="card card-oxygen">
                <h3>💨 Oxygen Cylinders</h3>
                <p>Available: <span id="available-oxygen">Loading...</span> / <span id="total-oxygen">0</span></p>
            </div>
        </div>

        <hr>

        <div class="admin-panel">
            <h2>Update Resource (Admin Panel)</h2>
            <form id="update-form">
                <label for="resource-type">Resource Type:</label>
                <select id="resource-type" required>
                    <option value="beds">Beds</option>
                    <option value="doctors">Doctors</option>
                    <option value="oxygenCylinders">Oxygen Cylinders</option>
                </select>

                <label for="resource-field">Field to Update:</label>
                <select id="resource-field" required>
                    <option value="available">Available / On Duty</option>
                    <option value="total">Total Capacity</option>
                </select>

                <label for="new-value">New Count:</label>
                <input type="number" id="new-value" min="0" placeholder="Enter new number" required>

                <button type="submit">Update Dashboard</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
